<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kirish</title>
  <link rel="icon" href="/img/36cc6850-12bc-4bd8-8721-4833a90f2da8.png" type="image/png">
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      font-family: 'Arial', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      background: linear-gradient(135deg, #2575fc, #6a11cb);
      animation: fadeIn 1.5s ease-in-out;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
    }
    .container {
      background: rgba(255, 255, 255, 0.95);
      padding: 30px 25px;
      border-radius: 15px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
      text-align: center;
      width: 100%;
      max-width: 400px;
      animation: slideDown 1s ease-out;
    }
    h2 {
      margin-top: 0;
      color: #333;
    }
    input, button {
      display: block;
      width: 100%;
      padding: 14px;
      margin-top: 18px;
      font-size: 16px;
      border-radius: 5px;
      border: 1px solid #ccc;
      transition: all 0.3s ease;
    }
    input:focus {
      outline: none;
      border-color: #2575fc;
      box-shadow: 0 0 6px rgba(37, 117, 252, 0.5);
    }
    button {
      background-color: #2575fc;
      color: white;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover {
      background-color: #6a11cb;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideDown {
      from {
        transform: translateY(-40px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    @media (max-width: 480px) {
      .container {
        padding: 25px 20px;
      }
      input, button {
        padding: 12px;
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Tizimga kirish</h2>
    <input type="text" id="name" placeholder="Ismingizni kiriting" required>
    <button onclick="login()">Kirish</button>
    <p style="margin-top: 10px; font-size: 14px;">Agar siz ro'yxatdan o'tmagan bo‘lsangiz, <a href="register.html">bu yerga bosing</a>.</p>
  </div>

  <script>
    function login() {
      const nameInput = document.getElementById('name').value.trim();
      const storedName = localStorage.getItem('user');

      if (!storedName) {
        alert("Siz hali ro'yxatdan o'tmagansiz. Iltimos, avval ro'yxatdan o'ting.");
        window.location.href = "register.html";
        return;
      }

      if (nameInput === storedName) {
        alert("Muvaffaqiyatli tizimga kirdingiz!");
        window.location.href = "order.html";
      } else {
        alert("Ism noto‘g‘ri. Iltimos, qayta urinib ko‘ring.");
      }
    }

    // Agar user allaqachon login bo‘lsa, to‘g‘ridan-to‘g‘ri order sahifasiga yo‘naltiramiz
    if (localStorage.getItem('user')) {
      window.location.href = "order.html";
    }
  </script>

  <script>
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('keydown', function(e) {
      if (
        (e.ctrlKey && ['u', 's', 'p', 'c'].includes(e.key.toLowerCase())) ||
        (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === 'i') ||
        e.key === 'F12'
      ) {
        e.preventDefault();
        alert("Bu amal bloklangan!");
      }
    });
    document.addEventListener('selectstart', e => e.preventDefault());
    document.addEventListener('copy', e => {
      e.preventDefault();
      alert("Nusxa olish mumkin emas!");
    });
    document.addEventListener("mousedown", function (e) {
      if (e.target.tagName === "IMG" && e.button === 2) {
        e.preventDefault();
      }
    });
  </script>
</body>
</html>
