<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <title>Ro'yxatdan o'tish</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #6a11cb, #2575fc);
      animation: fadeIn 1.5s ease-in-out;
    }
    .container {
      background: rgba(255, 255, 255, 0.9);
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
      text-align: center;
      animation: slideDown 1s ease-out;
    }
    input, button {
      display: block;
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      font-size: 16px;
      border-radius: 5px;
      border: 1px solid #ddd;
    }
    input:focus {
      outline: none;
      border-color: #6a11cb;
      box-shadow: 0 0 5px rgba(106, 17, 203, 0.5);
    }
    button {
      background-color: #6a11cb;
      color: white;
      border: none;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }
    button:hover {
      background-color: #2575fc;
    }
    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }
    @keyframes slideDown {
      from {
        transform: translateY(-50px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Ro'yxatdan o'tish</h2>
    <input type="text" id="name" placeholder="Ismingizni kiriting" required>
    <button onclick="register()">Ro'yxatdan o'tish</button>
  </div>

  <script>
    // Telegram ma'lumotlari
    const BOT_TOKEN = "7606592691:AAEX0POICKvjbOEwNQuAdUn-wqcqKdl-Gvc"; // Bu yerga o'zingizning bot tokeningizni yozing
    const CHAT_ID = "7833115003";     // Bu yerga o'zingizning chat ID'ingizni yozing

    function register() {
      const name = document.getElementById('name').value.trim();

      if (name) {
        // Foydalanuvchi ma'lumotlarini localStorage ga saqlash
        localStorage.setItem('user', name);

        // Telegramga xabar yuborish
        const message = `🆕 Yangi foydalanuvchi ro'yxatdan o'tdi:\n👤 Ismi: ${name}`;
        
        // Xabar yuborish uchun fetch() metodi
        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            chat_id: CHAT_ID,
            text: message
          })
        })
        .then(response => response.json())
        .then(data => {
          if (data.ok) {
            alert("Muvaffaqiyatli ro'yxatdan o'tdingiz!");
            window.location.href = "order.html"; // Ro'yxatdan o'tgach, order sahifasiga yo'naltirish
          } else {
            alert("Xatolik yuz berdi, iltimos qayta urinib ko'ring.");
          }
        })
        .catch(error => {
          alert("Xatolik yuz berdi: " + error.message);
        });
      } else {
        alert("Iltimos, ismingizni kiriting!");
      }
    }

    // Agar allaqachon ro'yxatdan o'tgan bo'lsa, to'g'ridan-to'g'ri order sahifasiga o'tkaziladi
    if (localStorage.getItem('user')) {
      window.location.href = "order.html";
    }
  </script>
</body>
</html>
