<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Elbek-Design</title>
  <link rel="icon" href="/img/36cc6850-12bc-4bd8-8721-4833a90f2da8.png" type="image/png">
<style>
    /* ====== PRO LEVEL MODERN GLASSMORPHISM DESIGN ====== */
    :root {
      --primary: #5f2eea;
      --secondary: #00c6fb;
      --accent: #ffb86c;
      --danger: #ff4d4f;
      --success: #43e97b;
      --bg-gradient: linear-gradient(120deg, #5f2eea 0%, #00c6fb 100%);
      --glass-bg: rgba(255,255,255,0.18);
      --glass-border: rgba(255,255,255,0.35);
      --glass-shadow: 0 8px 32px 0 rgba(31,38,135,0.18);
      --text-main: #23272f;
      --text-light: #fff;
      --input-bg: rgba(255,255,255,0.38);
      --input-border: rgba(95,46,234,0.18);
      --input-focus: #5f2eea;
      --button-bg: linear-gradient(90deg, #5f2eea 0%, #00c6fb 100%);
      --button-hover: linear-gradient(90deg, #00c6fb 0%, #5f2eea 100%);
      --delete-btn-bg: linear-gradient(90deg, #ff4d4f 0%, #ffb86c 100%);
      --delete-btn-hover: linear-gradient(90deg, #ffb86c 0%, #ff4d4f 100%);
      --radius: 2rem;
      --transition: .25s cubic-bezier(.68,-0.55,.27,1.55);
    }

    body {
      min-height: 100vh;
      margin: 0;
      font-family: 'Poppins', 'Segoe UI', Arial, sans-serif;
      background: var(--bg-gradient);
      display: flex;
      justify-content: center;
      align-items: center;
      color: var(--text-main);
      animation: bodyFadeIn 1.2s var(--transition);
      overflow-x: hidden;
    }

    @keyframes bodyFadeIn {
      from { opacity: 0; filter: blur(12px);}
      to { opacity: 1; filter: blur(0);}
    }

    .container {
      background: var(--glass-bg);
      border: 2.5px solid var(--glass-border);
      box-shadow: var(--glass-shadow);
      border-radius: var(--radius);
      padding: 2.5rem 2rem 2rem 2rem;
      width: 100%;
      max-width: 410px;
      position: relative;
      z-index: 1;
      backdrop-filter: blur(18px) saturate(1.5);
      animation: glassPop 1.1s var(--transition);
      overflow: hidden;
    }

    @keyframes glassPop {
      0% { transform: scale(0.85) translateY(60px); opacity: 0;}
      60% { transform: scale(1.05) translateY(-10px);}
      100% { transform: scale(1) translateY(0); opacity: 1;}
    }

    .container::before {
      content: "";
      position: absolute;
      inset: -4px;
      border-radius: calc(var(--radius) + 8px);
      z-index: -1;
      background: conic-gradient(from 90deg, #5f2eea, #00c6fb, #ffb86c, #5f2eea);
      background-size: 200% 200%;
      animation: borderSpin 8s linear infinite;
      opacity: 0.7;
      filter: blur(6px);
    }
    @keyframes borderSpin {
      0% { background-position: 0% 50%;}
      100% { background-position: 100% 50%;}
    }

    h2 {
      text-align: center;
      margin-bottom: 1.7rem;
      font-size: 1.7rem;
      font-weight: 800;
      letter-spacing: 1.5px;
      color: var(--primary);
      background: linear-gradient(90deg, #5f2eea 0%, #00c6fb 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: fadeInDown 1s .2s both;
      text-shadow: 0 2px 12px #5f2eea22;
    }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-40px);}
      to { opacity: 1; transform: translateY(0);}
    }

    label {
      display: block;
      margin-top: 1.1rem;
      font-weight: 600;
      letter-spacing: .5px;
      color: var(--primary);
      font-size: 1.01rem;
      animation: fadeInLeft .7s both;
    }

    @keyframes fadeInLeft {
      from { opacity: 0; transform: translateX(-30px);}
      to { opacity: 1; transform: translateX(0);}
    }

    input, select, textarea {
      width: 100%;
      padding: 12px 14px;
      margin-top: 7px;
      border-radius: 1.1rem;
      border: 1.5px solid var(--input-border);
      background: var(--input-bg);
      color: var(--text-main);
      font-size: 1.04rem;
      transition: border var(--transition), box-shadow var(--transition);
      outline: none;
      margin-bottom: 2px;
      box-sizing: border-box;
      animation: fadeInRight .7s both;
      backdrop-filter: blur(2px);
      font-family: inherit;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--input-focus);
      box-shadow: 0 0 0 3px #5f2eea33;
      animation: inputPulse .5s;
    }

    @keyframes fadeInRight {
      from { opacity: 0; transform: translateX(30px);}
      to { opacity: 1; transform: translateX(0);}
    }
    @keyframes inputPulse {
      0% { box-shadow: 0 0 0 0 #5f2eea44;}
      70% { box-shadow: 0 0 0 8px #5f2eea22;}
      100% { box-shadow: 0 0 0 3px #5f2eea33;}
    }

    .phone-group {
      display: flex;
      gap: 8px;
      margin-top: 7px;
    }

    .phone-group select {
      width: 38%;
      min-width: 90px;
    }

    .phone-group input {
      width: 62%;
    }

    .gender-group {
      display: flex;
      gap: 18px;
      margin-top: 14px;
      align-items: center;
      animation: fadeInLeft .7s both;
    }

    .gender-group input[type="radio"] {
      accent-color: var(--primary);
      margin-right: 3px;
      transform: scale(1.18);
    }

    .dob-group {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .dob-group input {
      width: 33%;
    }

    .age-group {
      margin-top: 10px;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 1.2rem;
      background: var(--button-bg);
      color: var(--text-light);
      font-weight: 700;
      font-size: 1.09rem;
      border-radius: 1.1rem;
      border: none;
      cursor: pointer;
      box-shadow: 0 2px 12px #5f2eea22;
      transition: background var(--transition), transform .15s, box-shadow var(--transition);
      animation: buttonPop .8s .2s both;
      letter-spacing: .5px;
      position: relative;
      overflow: hidden;
    }

    button::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, #fff6, #fff0 70%);
      opacity: 0;
      transition: opacity .2s;
      pointer-events: none;
    }
    button:active::after {
      opacity: 1;
    }

    @keyframes buttonPop {
      from { opacity: 0; transform: scale(0.9);}
      to { opacity: 1; transform: scale(1);}
    }

    button:hover, button:focus {
      background: var(--button-hover);
      transform: translateY(-2px) scale(1.03);
      box-shadow: 0 4px 18px #00c6fb33;
    }

    .delete-btn {
      background: var(--delete-btn-bg);
      margin-top: 10px;
      box-shadow: 0 2px 12px #ff4d4f22;
    }

    .delete-btn:hover, .delete-btn:focus {
      background: var(--delete-btn-hover);
      box-shadow: 0 4px 18px #ffb86c33;
    }

    .success, .error {
      padding: 13px;
      border-radius: 1.1rem;
      margin-top: 1.1rem;
      text-align: center;
      font-weight: 600;
      font-size: 1.04rem;
      display: none;
      animation: fadeInUp .7s both;
      letter-spacing: .5px;
      box-shadow: 0 2px 12px #43e97b22;
    }

    .success {
      background: var(--success);
      color: #fff;
    }

    .error {
      background: var(--danger);
      color: #fff;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px);}
      to { opacity: 1; transform: translateY(0);}
    }

    #price {
      margin-top: 13px;
      font-weight: bold;
      color: var(--success);
      font-size: 1.13rem;
      letter-spacing: .5px;
      animation: fadeIn .7s both;
      text-align: right;
    }

    @keyframes fadeIn {
      from { opacity: 0;}
      to { opacity: 1;}
    }

    /* ====== FLOATING ANIMATION FOR CONTAINER ====== */
    .container {
      animation: floatUp 2.5s cubic-bezier(.68,-0.55,.27,1.55) 0s 1;
    }
    @keyframes floatUp {
      0% { box-shadow: 0 0 0 0 rgba(31,38,135,0.0);}
      60% { box-shadow: 0 8px 32px 0 rgba(31,38,135,0.18);}
      100% { box-shadow: var(--glass-shadow);}
    }

    /* ====== RESPONSIVE DESIGN ====== */
    @media (max-width: 600px) {
      .container {
        padding: 1.1rem 2vw 1.5rem 2vw;
        border-radius: 1.1rem;
        max-width: 99vw;
        min-width: 0;
      }
      h2 {
        font-size: 1.15rem;
      }
      label, input, select, textarea, button {
        font-size: 0.98rem;
      }
      button {
        padding: 11px;
      }
      .phone-group select, .phone-group input, .dob-group input {
        font-size: 0.97rem;
      }
      #price {
        font-size: 1.01rem;
      }
    }

    /* ====== ANIMATED PLACEHOLDER ====== */
    input::placeholder, textarea::placeholder {
      color: #5f2eea99;
      opacity: 1;
      font-style: italic;
      letter-spacing: .2px;
      transition: color .2s;
      animation: placeholderPulse 2.5s infinite alternate;
    }
    @keyframes placeholderPulse {
      0% { color: #5f2eea99;}
      100% { color: #00c6fb99;}
    }

    /* ====== SCROLLBAR STYLING ====== */
    ::-webkit-scrollbar {
      width: 8px;
      background: #f0f0f0;
    }
    ::-webkit-scrollbar-thumb {
      background: linear-gradient(120deg, #5f2eea, #00c6fb);
      border-radius: 8px;
    }

    /* ====== USER DISPLAY BADGE ====== */
    #userDisplay {
      display: inline-block;
      background: linear-gradient(90deg, #5f2eea 0%, #00c6fb 100%);
      color: #fff;
      padding: 2px 12px;
      border-radius: 1rem;
      font-weight: 600;
      font-size: 1rem;
      letter-spacing: .5px;
      margin-left: 4px;
      box-shadow: 0 2px 8px #5f2eea22;
      animation: fadeIn .7s both;
    }
  </style>

  
</head>
<body>




  
  <div class="container">
    <h2>🎨 Dizayn Buyurtma Formasi</h2>

    <p><strong>Foydalanuvchi:</strong> <span id="userDisplay"></span></p>

    <label for="email">Elektron pochta:</label>
    <input type="email" id="email" placeholder="example@gmail.com" required />

    <label for="telegram">Telegram Username:</label>
    <input type="text" id="telegram" placeholder="Telegram username (@username)" />

    <label for="phone">Telefon raqami:</label>
    <div class="phone-group">
      <select id="country" onchange="updatePhonePrefix()" required>
        <option value="+998">🇺🇿 +998</option>
        <option value="+7">🇷🇺 +7</option>
      </select>
      <input type="tel" id="phone" placeholder="901234567" required />
    </div>

    <div class="gender-group">
      <label for="gender">Jinsini tanlang:</label>
      <input type="radio" id="male" name="gender" value="Erkak" required /> Erkak
      <input type="radio" id="female" name="gender" value="Ayol" required /> Ayol
    </div>

    <div class="dob-group">
      <label for="dob-day">Tug'ilgan kun:</label>
      <input type="number" id="dob-day" placeholder="Kun" min="1" max="31" required />
      <input type="number" id="dob-month" placeholder="Oy" min="1" max="12" required />
      <input type="number" id="dob-year" placeholder="Yil" min="1900" max="2025" required />
    </div>

    <div class="age-group">
      <label for="age">Yoshingiz:</label>
      <input type="number" id="age" placeholder="Yoshingizni kiriting" min="1" max="120" required />
    </div>

    <label for="game">O‘yin yoki ijtimoiy tarmoq tanlang:</label>
    <select id="game" required>
      <option value="PUBG">🎮 PUBG</option>
      <option value="PUBG">📢 Telegram</option>
      <option value="CSGO 2">💣 CSGO 2</option>
      <option value="DOTA 2">💎 DOTA 2</option>
      <option value="Free Fire">🔥 Free Fire</option>
      <option value="Call of Duty">⚔️ Call of Duty</option>
      <option value="Minecraft">⛏ Minecraft</option>
      <option value="Valorant">🎯 Valorant</option>
      <option value="Resident Evil">🧟‍♂️ Resident Evil</option>
      <option value="Silent Hill">🌫 Silent Hill</option>
      <option value="Amnesia">😱 Amnesia</option>
      <option value="Outlast">💀 Outlast</option>
    </select>

    <label for="type">Dizayn turi:</label>
    <select id="type" required onchange="updatePrice()">
      <option value="">-- Tanlang --</option>
      <option value="Prevyou">📺 Prevyou</option>
      <option value="Banner">🖼 Banner</option>
      <option value="Avatarka">👤 Avatarka</option>
      <option value="Logo">🎨 Logo</option>
    </select>

    <div id="price"></div>

    <label for="comment">Qo‘shimcha izoh:</label>
    <textarea id="comment" rows="4" placeholder="Masalan: O‘yinchi nomi, ranglar, yozuv..." required></textarea>

    <button onclick="sendOrder()">📩 Buyurtma berish</button>
    <button class="delete-btn" onclick="deleteAccount()">❌ Akkauntni o'chirish</button>

    <div class="success" id="successMessage">✅ Buyurtma muvaffaqiyatli yuborildi!</div>
    <div class="error" id="errorMessage">❌ Xatolik yuz berdi!</div>
  </div>

  <script>
    const user = localStorage.getItem('user');
    if (!user) {
      alert("Iltimos, avval ro'yxatdan o'ting!");
      window.location.href = "register.html";
    } else {
      document.getElementById("userDisplay").textContent = user;
    }

    const priceMap = {
      "Prevyou": 25000,
      "Banner": 15000,
      "Avatarka": 10000,
      "Logo": 15000
    };

    function updatePrice() {
      const designType = document.getElementById("type").value;
      const priceDiv = document.getElementById("price");
      const price = priceMap[designType] || 0;

      if (price > 0) {
        priceDiv.innerText = `Narxi: ${price.toLocaleString()} so'm`;
      } else {
        priceDiv.innerText = "";
      }
    }

    function updatePhonePrefix() {
      const countryCode = document.getElementById("country").value;
      const phoneInput = document.getElementById("phone");
      phoneInput.value = countryCode === "+7" ? "701234567" : "901234567";
    }

    async function sendOrder() {
      const email = document.getElementById("email").value.trim();
      const telegram = document.getElementById("telegram").value.trim();
      const country = document.getElementById("country").value;
      const phone = document.getElementById("phone").value.trim();
      const gender = document.querySelector('input[name="gender"]:checked').value;
      const day = document.getElementById("dob-day").value.trim();
      const month = document.getElementById("dob-month").value.trim();
      const year = document.getElementById("dob-year").value.trim();
      const age = document.getElementById("age").value.trim();
      const game = document.getElementById("game").value;
      const type = document.getElementById("type").value;
      const comment = document.getElementById("comment").value.trim();
      const price = priceMap[type] || 0; // Narxni olish

      if (email && phone && gender && day && month && year && age && game && type && comment) {
        const fullPhone = `${country} ${phone}`;
        const dob = `${day}-${month}-${year}`;
        const message = `
🖌 *Yangi Dizayn Buyurtmasi* 🎨

👤 *Foydalanuvchi:* ${user}
📧 *Email:* ${email}
📱 *Telefon:* ${fullPhone}
📲 *Telegram Username:* ${telegram ? `@${telegram}` : 'N/A'}
🚻 *Jinsi:* ${gender}
🎂 *Tug‘ilgan sana:* ${dob}
🔢 *Yosh:* ${age}
🎮 *O‘yin:* ${game}
🎨 *Dizayn turi:* ${type}
💰 *Narxi:* ${price.toLocaleString()} so'm
📝 *Izoh:* ${comment}
        `.trim();

        const token = "7606592691:AAEX0POICKvjbOEwNQuAdUn-wqcqKdl-Gvc";
        const chatId = "7833115003";
        const url = `https://api.telegram.org/bot${token}/sendMessage`;

        try {
          const response = await fetch(url, {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              chat_id: chatId,
              text: message,
              parse_mode: "Markdown"
            })
          });

          if (response.ok) {
            document.getElementById("successMessage").style.display = "block";
            setTimeout(() => {
              document.getElementById("successMessage").style.display = "none";
            }, 3000);
          } else {
            document.getElementById("errorMessage").style.display = "block";
            setTimeout(() => {
              document.getElementById("errorMessage").style.display = "none";
            }, 3000);
            console.error('Xatolik:', response.status);
          }
        } catch (error) {
          document.getElementById("errorMessage").style.display = "block";
          setTimeout(() => {
            document.getElementById("errorMessage").style.display = "none";
          }, 3000);
          console.error('Xatolik:', error);
        }

      } else {
        alert("Iltimos, barcha maydonlarni to‘ldiring!");
      }
    }

    async function deleteAccount() {
      if (confirm("Akkauntingizni o'chirishni xohlaysizmi?")) {
        localStorage.removeItem("user");
        alert("Akkauntingiz muvaffaqiyatli o'chirildi!");

        // Telegram botga xabar yuborish
        const message = `🚨 *Akkaunt o'chirildi* ❌

👤 *Foydalanuvchi:* ${user} 
Status: Akkaunti o'chirildi.`;

        const token = "7606592691:AAEX0POICKvjbOEwNQuAdUn-wqcqKdl-Gvc";
        const chatId = "7833115003";
        const url = `https://api.telegram.org/bot${token}/sendMessage`;

        try {
          const response = await fetch(url, {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              chat_id: chatId,
              text: message,
              parse_mode: "Markdown"
            })
          });

          if (response.ok) {
            // Xabar muvaffaqiyatli yuborildi
          } else {
            console.error('Telegramga xabar yuborishda xatolik:', response.status);
          }
        } catch (error) {
          console.error('Telegramga xabar yuborishda xatolik:', error);
        }

        window.location.href = "register.html"; // Registratsiya sahifasiga yo'naltirish
      }
    }
  </script>
  <script>
    // Sichqonchaning o'ng tugmasini bloklash
    document.addEventListener('contextmenu', function(e) {
      e.preventDefault();
    });
  
    // Klaviatura tugmalarini bloklash
    document.addEventListener('keydown', function(e) {
      // Ctrl + U, Ctrl + C, Ctrl + S, Ctrl + P, F12, Ctrl+Shift+I
      if (
        (e.ctrlKey && ['u', 's', 'p', 'c'].includes(e.key.toLowerCase())) ||
        (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === 'i') ||
        e.key === 'F12'
      ) {
        e.preventDefault();
        alert("Bu amal bloklangan!");
      }
    });
  
    // Matnni tanlashni bloklash
    document.addEventListener('selectstart', function(e) {
      e.preventDefault();
    });
  
    // Nusxa olishni bloklash
    document.addEventListener('copy', function(e) {
      e.preventDefault();
      alert("Nusxa olish mumkin emas!");
    });
  
    // Rasmni saqlashga urinishda to‘siq
    document.addEventListener("mousedown", function (e) {
      if (e.target.tagName === "IMG" && e.button === 2) {
        e.preventDefault();
      }
    });
  
    // Sayt kodini ko‘rishga urinishni aniqlash
    document.onkeydown = function(e) {
      if (
        e.keyCode === 123 || // F12
        (e.ctrlKey && e.shiftKey && e.keyCode === 73) || // Ctrl+Shift+I
        (e.ctrlKey && e.keyCode === 85) // Ctrl+U
      ) {
        return false;
      }
    };
  </script>
  
</body>
</html>
