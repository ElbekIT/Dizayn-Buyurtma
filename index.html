<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Elbek Design</title>
  <link rel="icon" href="/img/36cc6850-12bc-4bd8-8721-4833a90f2da8.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0; padding: 0; box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 30px 20px;
      width: 100%;
      max-width: 420px;
      text-align: center;
      color: white;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      animation: slideIn 1.2s ease-in-out;
    }

    @keyframes slideIn {
      from { transform: translateY(50px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    h1 {
      font-size: 30px;
      margin-bottom: 20px;
      color: #00d9ff;
    }

    .info {
      margin-bottom: 25px;
    }

    .info p {
      margin: 6px 0;
      font-size: 16px;
    }

    .status {
      font-weight: bold;
      margin-top: 15px;
    }

    .btn-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 20px;
    }

    .btn {
      padding: 12px 20px;
      border: 2px solid #00d9ff;
      border-radius: 10px;
      background: transparent;
      color: #00d9ff;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 14px;
    }

    .btn:hover {
      background: #00d9ff;
      color: #000;
    }

    .help-btn {
      position: fixed;
      bottom: 20px;
      left: 20px;
      width: 50px;
      height: 50px;
      background: #00d9ff;
      border-radius: 50%;
      border: none;
      font-size: 22px;
      color: #000;
      cursor: pointer;
      box-shadow: 0 0 15px #00d9ff80;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(5px);
      justify-content: center;
      align-items: center;
      z-index: 999;
    }

    .modal {
      background: white;
      padding: 30px;
      border-radius: 15px;
      text-align: center;
      max-width: 300px;
      color: #333;
      position: relative;
    }

    .modal img {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      margin-bottom: 10px;
    }

    .close-btn {
      position: absolute;
      top: 10px;
      right: 15px;
      font-size: 20px;
      color: #555;
      cursor: pointer;
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 24px;
      }

      .btn {
        font-size: 13px;
        padding: 10px 15px;
      }

      .modal {
        width: 90%;
        padding: 20px;
      }
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Elbek Design</h1>
    <div class="info">
      <p id="date"></p>
      <p id="time"></p>
      <p>💼 Ish vaqti: 07:00 – 01:00</p>
      <p class="status" id="status"></p>
    </div>
    <div class="btn-group">
      <a href="/html/byqan.html" class="btn">📄 Qanday buyurtma beriladi?</a>
      <button class="btn" onclick="checkOrderTime()">📝 Buyurtma berish</button>
    </div>
  </div>

  <!-- Yordam tugmasi -->
  <button class="help-btn" onclick="openHelp()">❓</button>

  <!-- Modal -->
  <div class="modal-overlay" id="helpModal">
    <div class="modal">
      <span class="close-btn" onclick="closeHelp()">✖</span>
      <img src="/img/36cc6850-12bc-4bd8-8721-4833a90f2da8.png" alt="Logo" />
      <h3>Elbek Qoriyev</h3>
      <p>📞 +998 90 406 30 90</p>
    </div>
  </div>

  <script>
    function updateTime() {
      const now = new Date();
      const dayNames = ['Yakshanba', 'Dushanba', 'Seshanba', 'Chorshanba', 'Payshanba', 'Juma', 'Shanba'];
      const day = dayNames[now.getDay()];
      const date = String(now.getDate()).padStart(2, '0');
      const month = String(now.getMonth() + 1).padStart(2, '0');
      const year = now.getFullYear();
      document.getElementById("date").textContent = `📆 ${day}, ${date}.${month}.${year}`;

      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      const seconds = String(now.getSeconds()).padStart(2, '0');
      document.getElementById("time").textContent = `🕒 ${hours}:${minutes}:${seconds}`;

      const nowTime = now.getHours() * 60 + now.getMinutes();
      const start = 7 * 60;
      const end = 1 * 60;

      const isOpen = nowTime >= start || nowTime < end;
      document.getElementById("status").innerHTML = isOpen
        ? "📢 <span style='color:limegreen'>Ish olib borilmoqda</span>"
        : "⚠️ <span style='color:red'>Hozir ish vaqti emas</span>";
    }

    setInterval(updateTime, 1000);
    updateTime();

    function checkOrderTime() {
      const now = new Date();
      const nowTime = now.getHours() * 60 + now.getMinutes();
      const start = 7 * 60;
      const end = 1 * 60;

      if (nowTime >= start || nowTime < end) {
        window.location.href = "/html/order.html";
      } else {
        alert("⚠️ Hozir ish vaqti emas. Buyurtma berish uchun 07:00 dan 01:00 gacha kuting.");
      }
    }

    function openHelp() {
      document.getElementById("helpModal").style.display = "flex";
    }

    function closeHelp() {
      document.getElementById("helpModal").style.display = "none";
    }
  </script>
</body>
</html>
