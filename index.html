<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Elbek Design</title>
  <link rel="icon" href="/img/36cc6850-12bc-4bd8-8721-4833a90f2da8.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0; padding: 0; box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #232526 0%, #414345 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
      overflow-x: hidden;
    }

    .card {
      background: rgba(30, 32, 34, 0.95);
      border-radius: 28px;
      padding: 38px 28px 32px 28px;
      width: 100%;
      max-width: 440px;
      text-align: center;
      color: #f5f6fa;
      box-shadow: 0 12px 40px 0 rgba(0,0,0,0.45), 0 1.5px 6px 0 #00d9ff40;
      border: 1.5px solid #00d9ff30;
      position: relative;
      overflow: hidden;
      animation: cardPop 1.1s cubic-bezier(.68,-0.55,.27,1.55);
    }

    @keyframes cardPop {
      0% { transform: scale(0.92) translateY(60px); opacity: 0; }
      60% { transform: scale(1.04) translateY(-10px); opacity: 1; }
      100% { transform: scale(1) translateY(0); opacity: 1; }
    }

    .card::before {
      content: "";
      position: absolute;
      top: -60px; left: -60px;
      width: 180px; height: 180px;
      background: radial-gradient(circle, #00d9ff55 0%, transparent 80%);
      z-index: 0;
    }

    .card > * {
      position: relative;
      z-index: 1;
    }

    h1 {
      font-size: 2.2rem;
      margin-bottom: 18px;
      color: #00d9ff;
      letter-spacing: 1.5px;
      text-shadow: 0 2px 12px #00d9ff44;
    }

    .info {
      margin-bottom: 28px;
    }

    .info p {
      margin: 7px 0;
      font-size: 1.08rem;
      letter-spacing: 0.2px;
      color: #e0e0e0;
    }

    .status {
      font-weight: bold;
      margin-top: 18px;
      font-size: 1.08rem;
      letter-spacing: 0.5px;
      text-shadow: 0 1px 6px #00ffb344;
    }

    .btn-group {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 22px;
    }

    .btn {
      padding: 13px 24px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(90deg, #00d9ff 0%, #00ffb3 100%);
      color: #232526;
      font-weight: 700;
      cursor: pointer;
      font-size: 1rem;
      box-shadow: 0 2px 10px #00d9ff33;
      transition: transform 0.18s, box-shadow 0.18s, background 0.18s, color 0.18s;
      outline: none;
      position: relative;
      overflow: hidden;
    }

    .btn::after {
      content: "";
      position: absolute;
      left: 50%; top: 50%;
      width: 0; height: 0;
      background: rgba(255,255,255,0.18);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      transition: width 0.3s, height 0.3s;
      z-index: 0;
    }

    .btn:active::after {
      width: 180%;
      height: 180%;
    }

    .btn:hover {
      background: linear-gradient(90deg, #00ffb3 0%, #00d9ff 100%);
      color: #181a1b;
      transform: translateY(-2px) scale(1.04);
      box-shadow: 0 4px 18px #00d9ff55;
    }

    .help-btn {
      position: fixed;
      bottom: 28px;
      left: 28px;
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #00d9ff 0%, #00ffb3 100%);
      border-radius: 50%;
      border: none;
      font-size: 2rem;
      color: #232526;
      cursor: pointer;
      box-shadow: 0 0 18px #00d9ff80, 0 2px 8px #00ffb355;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: box-shadow 0.2s, transform 0.2s;
      z-index: 1001;
    }

    .help-btn:hover {
      box-shadow: 0 0 32px #00d9ffcc, 0 4px 16px #00ffb399;
      transform: scale(1.07);
    }

    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: rgba(20, 22, 24, 0.82);
      backdrop-filter: blur(7px);
      justify-content: center;
      align-items: center;
      z-index: 2000;
      animation: modalFadeIn 0.4s;
    }

    @keyframes modalFadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .modal {
      background: linear-gradient(120deg, #f5f6fa 80%, #e0f7fa 100%);
      padding: 36px 24px 28px 24px;
      border-radius: 18px;
      text-align: center;
      max-width: 320px;
      color: #232526;
      position: relative;
      box-shadow: 0 8px 32px #00d9ff33;
      border: 1.5px solid #00d9ff33;
      animation: modalPop 0.5s cubic-bezier(.68,-0.55,.27,1.55);
    }

    @keyframes modalPop {
      0% { transform: scale(0.92) translateY(40px); opacity: 0; }
      100% { transform: scale(1) translateY(0); opacity: 1; }
    }

    .modal img {
      width: 68px;
      height: 68px;
      border-radius: 50%;
      margin-bottom: 12px;
      box-shadow: 0 2px 12px #00d9ff44;
      border: 2.5px solid #00d9ff55;
    }

    .close-btn {
      position: absolute;
      top: 14px;
      right: 18px;
      font-size: 1.5rem;
      color: #00d9ff;
      cursor: pointer;
      background: none;
      border: none;
      transition: color 0.2s;
    }

    .close-btn:hover {
      color: #00ffb3;
    }

    @media (max-width: 540px) {
      h1 {
        font-size: 1.4rem;
      }
      .card {
        padding: 22px 8px 18px 8px;
        max-width: 98vw;
        border-radius: 16px;
      }
      .btn {
        font-size: 0.97rem;
        padding: 11px 10px;
      }
      .modal {
        width: 96vw;
        padding: 18px 6px 16px 6px;
        border-radius: 13px;
      }
      .help-btn {
        width: 44px;
        height: 44px;
        font-size: 1.4rem;
        left: 12px;
        bottom: 12px;
      }
    }
  </style>
</head>
<body>




  



  <div class="card">
    <h1>Elbek Design</h1>
    <div class="info">
      <p id="date"></p>
      <p id="time"></p>
      <p>💼 Ish vaqti: 07:00 – 01:00</p>
      <p class="status" id="status"></p>
    </div>
    <div class="btn-group">
      <a href="/html/byqan.html" class="btn">📄 Qanday buyurtma beriladi?</a>
      <button class="btn" onclick="checkOrderTime()">📝 Buyurtma berish</button>
    </div>
  </div>

  <!-- Yordam tugmasi -->
  <button class="help-btn" onclick="openHelp()">❓</button>

  <!-- Modal -->
  <div class="modal-overlay" id="helpModal">
    <div class="modal">
      <span class="close-btn" onclick="closeHelp()">✖</span>
      <img src="/img/36cc6850-12bc-4bd8-8721-4833a90f2da8.png" alt="Logo" />
      <h3>Elbek Qoriyev</h3>
      <p>📞 +998 90 406 30 90</p>
      <p style="color: #837d7d; font-size: 14px; margin-top: 10px;">
        ⚠️ Diqqat: Bu raqam faqat ish vaqtida (07:00 – 01:00) faol!
      </p>
    </div>
  </div>

  <script>
    function updateTime() {
      const now = new Date();
      const dayNames = ['Yakshanba', 'Dushanba', 'Seshanba', 'Chorshanba', 'Payshanba', 'Juma', 'Shanba'];
      const day = dayNames[now.getDay()];
      const date = String(now.getDate()).padStart(2, '0');
      const month = String(now.getMonth() + 1).padStart(2, '0');
      const year = now.getFullYear();
      document.getElementById("date").textContent = `📆 ${day}, ${date}.${month}.${year}`;

      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      const seconds = String(now.getSeconds()).padStart(2, '0');
      document.getElementById("time").textContent = `🕒 ${hours}:${minutes}:${seconds}`;

      const nowTime = now.getHours() * 60 + now.getMinutes();
      const start = 7 * 60;
      const end = 1 * 60;

      const isOpen = nowTime >= start || nowTime < end;
      document.getElementById("status").innerHTML = isOpen
        ? "📢 <span style='color:limegreen'>Ish olib borilmoqda</span>"
        : "⚠️ <span style='color:red'>Hozir ish vaqti emas</span>";
    }

    setInterval(updateTime, 1000);
    updateTime();

    function checkOrderTime() {
      const now = new Date();
      const nowTime = now.getHours() * 60 + now.getMinutes();
      const start = 7 * 60;
      const end = 1 * 60;

      if (nowTime >= start || nowTime < end) {
        window.location.href = "/html/order.html";
      } else {
        alert("⚠️ Hozir ish vaqti emas. Buyurtma berish uchun 07:00 dan 01:00 gacha kuting.");
      }
    }

    function openHelp() {
      document.getElementById("helpModal").style.display = "flex";
    }

    function closeHelp() {
      document.getElementById("helpModal").style.display = "none";
    }
  </script>


 



</body>
</html>
